<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The State of B2B Marketing in Canada — 2026 Edition</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f0f0f;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 40px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .logo {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #ffffff;
      text-decoration: none;
    }
    .logo span { color: #e94e1b; }
    .download-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #e94e1b;
      color: #ffffff;
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 600;
      padding: 10px 20px;
      border-radius: 6px;
      transition: background 0.15s ease;
      white-space: nowrap;
    }
    .download-btn:hover { background: #c93e0e; }
    .download-btn svg { width: 15px; height: 15px; flex-shrink: 0; }
    .hero { padding: 48px 40px 32px; max-width: 760px; }
    .eyebrow {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #e94e1b;
      margin-bottom: 16px;
    }
    h1 {
      font-size: clamp(1.75rem, 4vw, 2.75rem);
      font-weight: 700;
      line-height: 1.15;
      letter-spacing: -0.03em;
      color: #ffffff;
      margin-bottom: 16px;
    }
    .subheading {
      font-size: 1rem;
      line-height: 1.6;
      color: rgba(255,255,255,0.55);
      max-width: 560px;
    }
    .pdf-wrapper {
      flex: 1;
      margin: 0 40px 40px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
      min-height: 0;
    }
    iframe {
      display: block;
      width: 100%;
      height: 100%;
      min-height: calc(100vh - 260px);
      border: none;
      background: #1a1a1a;
    }
    @media (max-width: 600px) {
      header { padding: 16px 20px; }
      .hero { padding: 32px 20px 24px; }
      .pdf-wrapper { margin: 0 20px 24px; }
      iframe { min-height: 70vh; }
    }
  </style>
</head>
<body>
  <header>
    <a href="https://mrgemarketing.com" class="logo">mrge<span>.</span></a>
    <a href="/2026-state-of-b2b-canada.pdf" download class="download-btn">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Download PDF
    </a>
  </header>
  <div class="hero">
    <p class="eyebrow">2026 Edition &nbsp;·&nbsp; mrge Marketing</p>
    <h1>The State of B2B Marketing<br>in Canada</h1>
    <p class="subheading">An in-depth look at how Canadian B2B marketers are navigating budget pressures, AI adoption, channel performance, and the evolving buyer journey in 2026.</p>
  </div>
  <div class="pdf-wrapper">
    <iframe
      src="/2026-state-of-b2b-canada.pdf"
      title="The State of B2B Marketing in Canada — 2026 Edition"
      allowfullscreen
    ></iframe>
  </div>
</body>
</html>
